name: Sync and deploy order data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate JSON files
        run: node scripts/sync-google-sheet.mjs
        env:
          GOOGLE_SHEETS_CONFIG: ${{ vars.GOOGLE_SHEETS_CONFIG }}
          CONTACT_URL: ${{ secrets.CONTACT_URL }}

      - name: Check whether data changed
        id: check_changes
        run: |
          if git diff --quiet -- site-public/orders-public.json site-admin/orders.json site-admin/vip.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "資料沒有變更"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "資料有變更"
          fi

      - name: Commit and push JSON if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-public/orders-public.json site-admin/orders.json site-admin/vip.json
          git commit -m "chore: sync order data from Google Sheets"
          git push

      - name: Deploy public worker
        if: steps.check_changes.outputs.changed == 'true'
        run: npx wrangler deploy -c wrangler.public.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy admin worker
        if: steps.check_changes.outputs.changed == 'true'
        run: npx wrangler deploy -c wrangler.admin.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}